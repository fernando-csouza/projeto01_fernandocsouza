<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Projeto no GitHub</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background-color: #0f172a;
            color: #e2e8f0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .container {
            text-align: center;
            max-width: 700px;
            padding: 40px;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        p {
            color: #94a3b8;
            margin-bottom: 30px;
        }

        .links a {
            display: inline-block;
            margin: 10px;
            padding: 12px 20px;
            border-radius: 8px;
            text-decoration: none;
            color: white;
            background-color: #2563eb;
            transition: 0.2s;
        }

        .links a:hover {
            background-color: #1d4ed8;
        }

        footer {
            margin-top: 40px;
            font-size: 0.9rem;
            color: #64748b;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>Meu Projeto</h1>

    <p>
        Esta página está hospedada no GitHub Pages.
        Aqui você pode apresentar seu projeto, documentação ou links úteis.
    </p>

    <div class="links">
        <!--<a href="https://github.com/">Repositório</a>
        <a href="#">Documentação</a>
        <a href="#">Demo</a> !-->
    </div>

    <footer>
        © 2026 - Fernando Cardoso de Souza
    </footer>

</div>

</body>
</html>
